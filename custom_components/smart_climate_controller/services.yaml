set_target_temperature:
  name: Set Target Temperature
  description: Set the target temperature for a climate zone
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the climate controller
      required: true
      example: "abc123"
      selector:
        text:
    temperature:
      name: Temperature
      description: Target temperature in Celsius
      required: true
      example: 21.5
      selector:
        number:
          min: 10
          max: 35
          step: 0.5
          unit_of_measurement: "°C"

force_update:
  name: Force Update
  description: Force immediate control cycle execution
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the climate controller
      required: true
      example: "abc123"
      selector:
        text:
